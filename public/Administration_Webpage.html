<!DOCTYPE html>
<html>
<head>
    <title>Home</title>
    <link rel="stylesheet" href="style.css">
    

    <script defer src="JAVASCRIPT.js"></script>
    
</head>
<body>

    <h1>Home Page</h1>

    
<div id="Register-screen" class="center-box">
    <h2>Register if there is no account</h2>

    <input type="text" id="username" placeholder="Username" />
    <input type="password" id="password" placeholder="Password" />
    <input type="text" id="role" placeholder="role" />
    <input type="text" id="org" placeholder="organization" />

    <button onclick="register()">Register</button>

    <p id="message"></p>
    </div>

<div id="org" class="center-box">
    <h2>Register new organisation in the system.</h2>

    <input type="text" id="username" placeholder="Username" />

    <button onclick="create_org()">Register</button>

    <p id="message"></p>
    </div>

   
</body>
</html>
