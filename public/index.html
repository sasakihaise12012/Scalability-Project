<!DOCTYPE html>
<html>
<head>
    <title>Home</title>
    <link rel="stylesheet" href="style.css">
    

    <script src="JAVASCRIPT.js" defer></script>
    
</head>
<body>

<div id="login-screen" class="center-box">
    <h2>Login Required</h2>

    <input type="text" id="username" placeholder="Username" />
    <input type="password" id="password" placeholder="Password" />

    <button onclick="login()">Login</button>

    <p id="message"></p>
    </div>

<br>
<br>

<div id="Task Section" class="center-box">
    <h2>Enter a new task.</h2>
    <h3>Enter the project that the task belongs to.</h3>

    <input type="text" id="project_id" placeholder="Project's id" />
    <br>
    <h3>Enter the task</h3>
    
    <input type="Text" id="title" placeholder="title"/>
    <input type="Text" id="Description" placeholder="Description"/>
    <input type="Text" id="status" placeholder="status"/>
    <input type="Text" id="user_responsible_id" placeholder="Responsible user's id"/>

    <button onclick="enter_task()">Enter</button>

    <p id="message"></p>
    </div>

<div id="a_new_project" class="center-box">
    <h2>Enter new project</h2>

    <input type="text" id="new_project" placeholder="Project name" />
    <input type="text" id="org_id" placeholder="organization's id" /> <!--is the ' allowed in placeholder? check it out-->

    <button onclick="new_project()">Login</button>

    <p id="message"></p>
    </div>

    
</body>
</html>
