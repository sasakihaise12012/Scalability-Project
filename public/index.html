<!DOCTYPE html>
<html>
<head>
    <title>Home</title>
    <link rel="stylesheet" href="style.css">
    

    <script src="JAVASCRIPT.js" defer></script>
    
</head>
<body>

<div id="login-screen" class="center-box">
    <h2>Login Required</h2>

    <input type="text" id="username" placeholder="Username" />
    <input type="password" id="password" placeholder="Password" />

    <button onclick="login()">Login</button>

    <p id="message"></p>
    </div>

<br>
<br>

<div id="Project Section" class="center-box">
    <h2>Enter Project</h2>

    <input type="text" id="project" placeholder="name" />
    <br>
    <h3>Enter Tasks</h3>
    
    <input type="Text" id="title" placeholder="title"/>
    <input type="Text" id="Description" placeholder="Description"/>
    <input type="Text" id="status" placeholder="status"/>
    <input type="Text" id="user_responsible_id" placeholder="Responsible user's id"/>

    <button onclick="enter_projects_or_tasks()">Enter</button>

    <p id="message"></p>
    </div>


    
</body>
</html>
